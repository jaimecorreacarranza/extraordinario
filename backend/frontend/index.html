<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Validación</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Sistema de Validación de Documentos</h1>

    <button onclick="cerrarSesion()">
    Cerrar Sesión
</button>

    <input
    type="text"
    id="titulo"
    placeholder="Título del documento"
    required>

<input
    type="text"
    id="tipo"
    placeholder="Tipo de documento"
    required>

<input
    type="text"
    id="area"
    placeholder="Área emisora"
    required>

    <form id="formulario">
        <input type="file" id="pdf" accept=".pdf">
        <button type="submit">Subir PDF</button>
    </form>

    <p id="mensaje"></p>

   <h2>Repositorio de Documentos</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Título</th>
            <th>Tipo</th>
            <th>Área</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Acciones</th>
            <th>Validar</th>
        </tr>
    </thead>

    <tbody id="tablaDocumentos">
    </tbody>
</table>
<script>
if (
    localStorage.getItem("autenticado")
    !== "si"
) {
    window.location.href =
    "login.html";
}
</script>

<script src="script.js"></script>

</body>
</html>
