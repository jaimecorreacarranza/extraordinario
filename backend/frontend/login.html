<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema de Validación</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Sistema de Validación de Documentos</h1>

    <form id="loginForm">

        <input
            type="text"
            id="usuario"
            placeholder="Usuario"
            required>

        <input
            type="password"
            id="password"
            placeholder="Contraseña"
            required>

        <button type="submit">
            Iniciar Sesión
        </button>

    </form>

    <p id="mensaje"></p>

    <script src="login.js"></script>

</body>
</html>
